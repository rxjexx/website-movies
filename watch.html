<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - LUMIÈRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="storage.js"></script>
    <style>
        @keyframes animationIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOutDown {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(40px);
            }
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeOutScale {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutLeft {
            0% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50px);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutRight {
            0% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(50px);
            }
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 -1px 1px rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
        }

        .glass-highlight {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 1.5rem;
            z-index: 10;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-right-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .player-loading.hidden {
            display: none;
        }

        [animation:animationIn_0.8s_ease-out_0.1s_both] {
            animation: animationIn 0.8s ease-out 0.1s both;
        }

        /* Scroll animations removed - using only load animations for smooth scrolling */
        .animate-on-scroll { animation: none !important; }
        .scroll-fade-in { animation: none !important; opacity: 1 !important; }
        .scroll-scale-in { animation: none !important; opacity: 1 !important; transform: scale(1) !important; }
        .scroll-slide-left { animation: none !important; opacity: 1 !important; transform: none !important; }
        .scroll-slide-right { animation: none !important; opacity: 1 !important; transform: none !important; }
        .scroll-section { animation: none !important; opacity: 1 !important; transform: none !important; }

        /* ========================
           UNIFIED BUTTON STYLES
           ======================== */

        .btn-standard {
            @apply px-4 py-3 rounded-lg font-semibold text-sm tracking-tight transition-all duration-300 ease-out cursor-pointer inline-flex items-center justify-center gap-2 relative overflow-hidden;
        }

        .btn-primary {
            @apply bg-gradient-to-br from-zinc-800 to-zinc-900 border border-zinc-700/50 text-zinc-300 hover:text-white hover:bg-gradient-to-br hover:from-zinc-700 hover:to-zinc-800 hover:-translate-y-1 hover:shadow-lg;
        }

        .btn-secondary {
            @apply bg-transparent border-2 border-zinc-600 text-zinc-300 hover:text-white hover:bg-zinc-900/50 hover:border-zinc-500 hover:-translate-y-1 hover:shadow-lg;
        }

        .btn-accent {
            @apply bg-gradient-to-br from-yellow-500 to-yellow-600 text-black font-bold hover:from-yellow-400 hover:to-yellow-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-yellow-500/50;
        }

        .btn-icon {
            @apply w-4 h-4 flex items-center justify-center;
        }

        .btn:disabled {
            @apply opacity-50 cursor-not-allowed;
        }

        /* Video Player Interactivity */
        #videoPlayer {
            pointer-events: auto !important;
            z-index: 10;
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
        }

        .player-loading {
            pointer-events: auto;
            z-index: 5;
        }

        .glass-card {
            pointer-events: auto !important;
        }

        main {
            pointer-events: auto !important;
        }

        .flex.flex-col.gap-12 {
            pointer-events: auto !important;
        }
    </style>
    <script>
        (function () {
            const style = document.createElement("style");
            style.textContent = `.animate-on-scroll { animation-play-state: paused !important; } .animate-on-scroll.animate { animation-play-state: running !important; }`;
            document.head.appendChild(style);
            const once = true;
            if (!window.__inViewIO) {
                window.__inViewIO = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("animate");
                            if (once) window.__inViewIO.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.2, rootMargin: "0px 0px -10% 0px" });
            }
            window.initInViewAnimations = function (selector = ".animate-on-scroll") {
                document.querySelectorAll(selector).forEach((el) => {
                    window.__inViewIO.observe(el);
                });
            };
            document.addEventListener("DOMContentLoaded", () => {
                initInViewAnimations();
                lucide.createIcons();
            });
        })();
    </script>
</head>

<!-- Main Content -->
<main class="relative z-20 container mx-auto px-6 md:px-12 flex flex-col justify-center pt-32 pb-10 md:pb-16" style="pointer-events: auto;">
    
    <div class="flex flex-col gap-12 pointer-events-auto" style="pointer-events: auto;">
        
        <!-- Back Button -->
        <a href="index.html" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors group w-fit [animation:animationIn_0.8s_ease-out_0.1s_both]">
            <iconify-icon icon="solar:arrow-left-linear" class="w-4 h-4 flex items-center justify-center group-hover:-translate-x-1 transition-transform" style="stroke-width: 1.5;"></iconify-icon>
            <span class="text-sm font-medium">Back to Home</span>
        </a>

        <!-- Video Player Section -->
        <div class="glass-card p-2 md:p-3 w-full [animation:animationIn_0.8s_ease-out_0.2s_both]" style="pointer-events: auto; position: relative; z-index: 10;">
            <div class="relative w-full bg-black rounded-[1.25rem] overflow-hidden" style="aspect-ratio: 16/9; pointer-events: auto;">
                <div class="player-loading" id="playerLoading" style="pointer-events: none; z-index: 5;">
                    <div class="absolute inset-0 bg-gradient-to-br from-zinc-900 via-black to-zinc-900 flex items-center justify-center flex-col gap-4">
                        <div class="loading-spinner"></div>
                        <div class="flex flex-col items-center gap-2">

                            <p class="text-zinc-400 text-sm" id="loadingSubtext">Preparing your stream</p>
                        </div>
                    </div>
                </div>
                <iframe id="videoPlayer" class="w-full h-full" frameborder="0" allowfullscreen allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" style="pointer-events: auto; z-index: 10; position: relative;"></iframe>
            </div>
            <div class="glass-highlight" style="pointer-events: none;"></div>
        </div>

        <!-- Server Selector -->
        <div class="glass-card p-5 md:p-6 w-full [animation:animationIn_0.8s_ease-out_0.3s_both]">
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-2">
                    <iconify-icon icon="solar:server-linear" class="w-5 h-5 text-zinc-400" style="stroke-width: 1.5;"></iconify-icon>
                    <span class="text-sm font-medium text-zinc-300">Select Streaming Server</span>

                <div class="flex flex-wrap items-center gap-4 text-zinc-400">

            <!-- Overview -->

                <h3 class="text-sm font-medium text-zinc-300 mb-3">Overview</h3>
                <p class="text-base font-normal text-zinc-400 leading-relaxed" id="watchOverview">Loading movie details...</p>
            </div>

            <!-- Additional Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<!-- Footer -->
<footer class="relative z-20 mt-20 border-t border-zinc-800/50 bg-black/50 backdrop-blur-sm">
    <div class="container mx-auto px-6 md:px-12 py-8 text-center text-sm text-zinc-500">
        <p>Made by Ethan • LUMIÈRE © 2024</p>
    </div>
</footer>

<script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:5000/api'
        : '/.netlify/functions';

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const movieId = params.get('id');
    const mediaType = params.get('type');
    const title = params.get('title');

    console.log('Watch Page initialized - ID:', movieId, 'Type:', mediaType, 'Title:', title);

    // Validate required parameters
    if (!movieId) {
        document.getElementById('serverStatus').textContent = 'Error: No movie ID provided';
        document.getElementById('loadingSubtext').textContent = 'Please go back and select a movie';
        console.error('No movie ID in URL parameters');
    }

    // Get DOM elements
    const serverButtons = document.getElementById('serverButtons');
    const playerLoading = document.getElementById('playerLoading');
    const serverStatus = document.getElementById('serverStatus');
    const loadingSubtext = document.getElementById('loadingSubtext');
    const videoPlayer = document.getElementById('videoPlayer');

    let currentStreams = [];

    // Fetch streams from backend with retry logic
    async function fetchStreams() {
        try {
            console.log('Fetching streams for movie:', movieId);
            let url;
            
            // Build correct URL based on environment
            if (API_BASE_URL === '/.netlify/functions') {
                url = `/.netlify/functions/movies-streams?id=${movieId}`;
            } else {
                url = `${API_BASE_URL}/movies/streams/${movieId}`;
            }
            
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log('Streams response:', data);
            
            if (data.success && data.streams) {
                currentStreams = data.streams;
                console.log('Loaded', currentStreams.length, 'streams');
                initializeServers();
            } else {
                console.error('Failed to fetch streams:', data.error);
                showErrorMessage('Failed to load streaming servers. Please refresh the page.');
            }
        } catch (error) {
            console.error('Error fetching streams:', error);
            showErrorMessage('Error loading streaming servers. Please check your connection.');
            
            // Retry after 2 seconds
            console.log('Retrying in 2 seconds...');
            setTimeout(fetchStreams, 2000);
        }
    }

    // Initialize server buttons
    function initializeServers() {
        console.log('Initializing', currentStreams.length, 'servers');
        serverButtons.innerHTML = '';
        
        if (!currentStreams || currentStreams.length === 0) {
            showErrorMessage('No streaming servers available');
            return;
        }
        
        currentStreams.forEach((stream, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-standard btn-primary group relative inline-flex cursor-pointer transition-all duration-500 ease-out hover:-translate-y-1 font-normal text-sm tracking-tight bg-gradient-to-br from-zinc-800 to-zinc-900 border border-zinc-700/50 rounded-lg px-4 py-3 items-center justify-center gap-2 text-zinc-300 hover:text-white hover:bg-gradient-to-br hover:from-zinc-700 hover:to-zinc-800 overflow-hidden';
            btn.innerHTML = `
                <span class="flex items-center gap-2">
                    <iconify-icon icon="solar:server-linear" class="w-4 h-4" style="stroke-width: 1.5;"></iconify-icon>
                    <span>${stream.name}</span>
                    <span class="text-xs opacity-60 font-normal">${stream.quality}</span>
                </span>
            `;
            btn.title = stream.status;
            btn.onclick = () => selectServer(stream, btn, index);
            serverButtons.appendChild(btn);
            console.log('Added server button:', stream.name);
        });

        // Select first server by default
        if (currentStreams.length > 0) {
            const firstBtn = serverButtons.querySelector('button');
            if (firstBtn) {
                console.log('Selecting first server by default');
                selectServer(currentStreams[0], firstBtn, 0);
            }
        }
    }

    // Select and load a server
    function selectServer(stream, buttonElement, index) {
        console.log('Selecting server:', stream.name, 'URL:', stream.url);
        
        // Show loading indicator
        playerLoading.classList.remove('hidden');
        serverStatus.textContent = `Connecting to ${stream.name}...`;
        loadingSubtext.textContent = `${stream.status} • ${stream.quality} Quality`;

        // Update button states
        document.querySelectorAll('#serverButtons button').forEach(btn => {
            btn.classList.remove('ring-2', 'ring-yellow-500');
        });
        buttonElement.classList.add('ring-2', 'ring-yellow-500');

        // Load the stream
        setTimeout(() => {
            if (stream.type === 'iframe') {
                loadIframeStream(stream.url, stream.name);
            }
        }, 500);
    }

    // Load iframe stream - basic embed
    function loadIframeStream(url, serverName) {
        serverStatus.textContent = `Loading from ${serverName}...`;
        
        const videoPlayer = document.getElementById('videoPlayer');
        
        // Simply set the src - no complex handling
        videoPlayer.src = url;
        
        // Hide loading after a short delay
        setTimeout(() => {
            playerLoading.classList.add('hidden');
            serverStatus.textContent = 'Stream Ready';
        }, 2000);
    }

    // Track current server index
    let currentServerIndex = 0;

    // Try next server
    function tryNextServer() {
        currentServerIndex++;
        
        if (currentServerIndex < currentStreams.length) {
            console.log('Trying server index:', currentServerIndex);
            const nextStream = currentStreams[currentServerIndex];
            const nextBtn = document.querySelectorAll('#serverButtons button')[currentServerIndex];
            
            if (nextBtn) {
                console.log('Automatically selecting next server:', nextStream.name);
                selectServer(nextStream, nextBtn, currentServerIndex);
            }
        } else {
            console.error('All servers exhausted');
            serverStatus.textContent = 'All servers failed';
            loadingSubtext.textContent = 'No working servers available. Please try again later.';
            playerLoading.classList.add('hidden');
        }
    }

    // Show error message
    function showErrorMessage(message) {
        console.error('Error message:', message);
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: #f87171; padding: 1rem; text-align: center; font-size: 0.875rem; margin: 0.5rem 0; background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; border-radius: 0.5rem;';
        errorDiv.textContent = message;
        serverButtons.appendChild(errorDiv);
        
        // Also update status
        serverStatus.textContent = 'Server Issue';
        loadingSubtext.textContent = message;
    }

    // Detect if page is being redirected
    window.addEventListener('unload', function() {
        console.log('Page unloading - watch page is closing');
    });

    // Monitor for redirect attempts
    if (window.top !== window.self) {
        console.log('Watch page is in an iframe (this is expected if coming from another page)');
    }

    // Protect against iframe redirects by monitoring navigation
    let isNavigatingAway = false;

    console.log('Watch page ready');
    try {
        document.getElementById('watchTitle').textContent = decodeURIComponent(title) || 'Unknown Title';
        document.getElementById('watchType').textContent = mediaType === 'show' ? 'TV Series' : 'Movie';
        document.getElementById('watchYear').textContent = new Date().getFullYear();
        document.getElementById('watchRating').textContent = '★★★★★ 8.5/10';
        document.getElementById('watchOverview').textContent = 'Select a server below to start streaming. All servers support high quality video with minimal lag.';
    } catch (error) {
        console.error('Error populating page:', error);
    }

    // Initialize on page load - handle both cases (DOM loaded or loading)
    function initializeWatch() {
        console.log('Initializing watch page - ID:', movieId);
        
        if (movieId) {
            // Fetch streams immediately
            fetchStreams();
        } else {
            document.getElementById('serverStatus').textContent = 'Error: No movie selected';
        }
        
        // Save to recently watched
        if (movieId && mediaType && title) {
            try {
                lumiereStorage.addToRecentlyWatched({
                    id: movieId,
                    title: decodeURIComponent(title),
                    type: mediaType,
                    poster_path: null
                });
                console.log('Added to recently watched:', movieId);
            } catch (error) {
                console.error('Error saving to recently watched:', error);
            }
        }
    }

    // Initialize watch based on document readyState
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeWatch);
    } else {
        // DOM is already loaded
        initializeWatch();
    }

    console.log('Watch Page script initialized - ID:', movieId, 'Type:', mediaType, 'Title:', title);
</script>

</body>
